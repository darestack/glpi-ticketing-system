version: "3.8"

services:
  glpi:
    image: diouxx/glpi:latest
    container_name: glpi
    environment:
      - TIMEZONE=Africa/Lagos
    ports:
      - "8080:80"
    volumes:
      - glpi_files:/var/www/html/glpi
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mariadb:10.11
    container_name: glpi_db
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-glpi}
      - MYSQL_USER=${MYSQL_USER:-glpi}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - glpi_db:/var/lib/mysql
    restart: unless-stopped
    # MariaDB is NOT exposed on a host port.
    # Only the glpi container can reach it over the internal Docker network.

volumes:
  glpi_files:
  glpi_db:

networks:
  default:
    name: glpi_network
